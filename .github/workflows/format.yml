name: Format Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  clang-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install clang-format-22
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-22 main" \
            | sudo tee /etc/apt/sources.list.d/llvm-22.list
          sudo apt-get update -qq
          sudo apt-get install -y clang-format-22

      - name: Check formatting
        run: |
          find ShirayukiMemory GUI Tweak \
            \( -name '*.cpp' -o -name '*.hpp' -o -name '*.mm' \
            -o -name '*.m' -o -name '*.h' \) \
            | xargs clang-format-22 --dry-run --Werror
