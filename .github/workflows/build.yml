name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Theos
        uses: theos/theos-action@main
        with:
          theos-sdks-path: ./sdks

      - name: Build
        run: make clean && make

      - name: Upload .deb
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shirayuki-deb
          path: packages/*.deb
