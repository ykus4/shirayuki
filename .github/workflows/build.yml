name: Build

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  pull-requests: write

jobs:
  build:
    runs-on: macos-latest

    env:
      THEOS: ${{ github.workspace }}/theos

    steps:
      - uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos
          key: theos-${{ runner.os }}-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Install Theos
        run: |
          if [ ! -d "$THEOS" ]; then
            git clone --recursive https://github.com/theos/theos.git "$THEOS"
          fi

      - name: Cache SDKs
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/theos/sdks
          key: theos-sdks-${{ runner.os }}-iPhoneOS16.5

      - name: Download iOS SDK
        run: |
          if [ ! -d "$THEOS/sdks/iPhoneOS16.5.sdk" ]; then
            curl -L -o sdk.tar.xz \
              https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
            tar -xJf sdk.tar.xz -C "$THEOS/sdks"
            rm sdk.tar.xz
          fi

      - name: Install ldid
        run: brew install ldid

      - name: Compute version
        id: ver
        run: |
          BASE=$(grep '^Version:' layout/DEBIAN/control | awk '{print $2}')
          SHORT="${GITHUB_SHA:0:7}"
          BRANCH="${GITHUB_REF_NAME//\//-}"
          BUILD=$(git rev-list --count HEAD)
          if [[ "$GITHUB_REF_NAME" == "main" ]]; then
            VER="$BASE"
          else
            VER="${BASE}-dev.${BUILD}+${SHORT}"
          fi
          sed -i '' "s/^Version: .*/Version: $VER/" layout/DEBIAN/control
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "artifact=shirayuki-${BRANCH}-${SHORT}" >> $GITHUB_OUTPUT

      - name: Build
        id: build
        run: make clean && make package

      - name: Upload .deb
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ver.outputs.artifact }}
          path: packages/*.deb

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ steps.build.outcome }}' === 'success';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const ver = '${{ steps.ver.outputs.ver }}';
            const artifact = '${{ steps.ver.outputs.artifact }}';
            const lines = [
              `${success ? '✅' : '❌'} **Build ${success ? 'succeeded' : 'failed'}** — \`${ver}\``,
              '',
            ];
            if (success) {
              lines.push(`📦 [Download .deb](${runUrl}) (Actions → Artifacts → \`${artifact}\`)`);
            } else {
              lines.push(`🔍 [View logs](${runUrl})`);
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: lines.join('\n'),
            });
